<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d1117" />
  <title>VocalStudio Mobile PWA</title>
  <link rel="manifest" href="manifest.json" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .glassmorphism { background: rgba(22, 27, 34, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    input[type=range] { -webkit-appearance: none; background: #30363d; height: 6px; border-radius: 3px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #ec4899; cursor: pointer; }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col justify-between select-none">

  <header class="p-4 glassmorphism sticky top-0 z-50 flex items-center justify-between border-b border-slate-800">
    <div class="flex items-center space-x-2">
      <i class="fa-solid font-bold text-pink-500 text-xl fa-microphone-lines"></i>
      <h1 class="font-black text-lg tracking-wider bg-gradient-to-r from-pink-500 to-purple-500 bg-clip-text text-transparent">VocalStudio</h1>
    </div>
    <div id="statusBadge" class="text-xs px-2.5 py-1 rounded-full bg-slate-800 text-slate-400 border border-slate-700">Mic Idle</div>
  </header>

  <main class="flex-1 p-4 flex flex-col justify-between max-w-md mx-auto w-full space-y-4">
    
    <div class="relative w-full h-36 glassmorphism rounded-2xl overflow-hidden shadow-inner flex items-center justify-center">
      <canvas id="visualizer" class="absolute inset-0 w-full h-full"></canvas>
      <div id="pitchDisplay" class="absolute bottom-2 right-3 text-xs font-mono bg-black/60 px-2 py-0.5 rounded text-pink-400 border border-pink-500/20">Detected: -- Hz</div>
    </div>

    <section>
      <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Preset Voice Filters</h2>
      <div class="grid grid-cols-3 gap-2">
        <button onclick="setFilter('clean')" id="btn-clean" class="filter-btn p-3 rounded-xl glassmorphism border-pink-500 text-xs font-semibold flex flex-col items-center gap-1.5 active:scale-95 transition">
          <i class="fa-solid fa-wand-magic-sparkles text-pink-400 text-base"></i> Studio Clean
        </button>
        <button onclick="setFilter('autotune')" id="btn-autotune" class="filter-btn p-3 rounded-xl glassmorphism text-xs font-semibold flex flex-col items-center gap-1.5 active:scale-95 transition text-slate-400">
          <i class="fa-solid fa-sliders text-purple-400 text-base"></i> Auto-Tune
        </button>
        <button onclick="setFilter('reverb')" id="btn-reverb" class="filter-btn p-3 rounded-xl glassmorphism text-xs font-semibold flex flex-col items-center gap-1.5 active:scale-95 transition text-slate-400">
          <i class="fa-solid fa-building-columns text-cyan-400 text-base"></i> Concert Hall
        </button>
        <button onclick="setFilter('radio')" id="btn-radio" class="filter-btn p-3 rounded-xl glassmorphism text-xs font-semibold flex flex-col items-center gap-1.5 active:scale-95 transition text-slate-400">
          <i class="fa-solid fa-radio text-amber-400 text-base"></i> Vintage Radio
        </button>
        <button onclick="setFilter('robot')" id="btn-robot" class="filter-btn p-3 rounded-xl glassmorphism text-xs font-semibold flex flex-col items-center gap-1.5 active:scale-95 transition text-slate-400">
          <i class="fa-solid fa-robot text-emerald-400 text-base"></i> Cyber Robot
        </button>
        <button onclick="setFilter('bypass')" id="btn-bypass" class="filter-btn p-3 rounded-xl glassmorphism text-xs font-semibold flex flex-col items-center gap-1.5 active:scale-95 transition text-slate-400">
          <i class="fa-solid fa-microphone text-slate-400 text-base"></i> Raw Voice
        </button>
      </div>
    </section>

    <section class="glassmorphism p-4 rounded-2xl space-y-3">
      <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Effect Tweaks</h2>
      
      <div>
        <div class="flex justify-between text-xs mb-1">
          <span class="text-slate-300">Vocal Pitch Snap Speed (Auto-Tune)</span>
          <span id="speedVal" class="text-pink-400 font-mono">50 ms</span>
        </div>
        <input type="range" id="tuneSpeed" min="10" max="200" value="50" class="w-full" oninput="updateTuneSpeed(this.value)" />
      </div>

      <div>
        <div class="flex justify-between text-xs mb-1">
          <span class="text-slate-300">Reverb Wet Level</span>
          <span id="reverbVal" class="text-pink-400 font-mono">30%</span>
        </div>
        <input type="range" id="reverbLevel" min="0" max="100" value="30" class="w-full" oninput="updateReverb(this.value)" />
      </div>

      <div>
        <div class="flex justify-between text-xs mb-1">
          <span class="text-slate-300">Echo Delay Time</span>
          <span id="echoVal" class="text-pink-400 font-mono">0.2s</span>
        </div>
        <input type="range" id="echoDelay" min="0" max="1" step="0.05" value="0.2" class="w-full" oninput="updateEcho(this.value)" />
      </div>
    </section>

    <section class="glassmorphism p-4 rounded-2xl space-y-3">
      <div class="flex justify-between items-center">
        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Karaoke Backing Track</h2>
        <label class="text-xs text-pink-400 cursor-pointer font-medium hover:underline">
          <i class="fa-solid fa-file-audio"></i> Load Track
          <input type="file" id="trackInput" accept="audio/*" class="hidden" onchange="loadKaraokeTrack(event)" />
        </label>
      </div>
      <div id="trackName" class="text-xs text-slate-400 truncate">No backing track loaded</div>
      <audio id="karaokeAudio" controls class="w-full h-8 rounded-lg opacity-80"></audio>
    </section>

    <section class="grid grid-cols-3 gap-3">
      <button id="micToggleBtn" onclick="toggleMic()" class="p-3 bg-slate-800 border border-slate-700 rounded-2xl flex flex-col items-center justify-center gap-1 active:scale-95 transition">
        <i id="micIcon" class="fa-solid fa-microphone-slash text-slate-400 text-lg"></i>
        <span id="micLabel" class="text-xs font-bold">Start Mic</span>
      </button>

      <button id="recBtn" onclick="toggleRecording()" disabled class="p-3 bg-pink-600 disabled:opacity-40 rounded-2xl flex flex-col items-center justify-center gap-1 active:scale-95 transition">
        <i id="recIcon" class="fa-solid fa-circle text-white text-lg"></i>
        <span id="recLabel" class="text-xs font-bold">Record</span>
      </button>

      <button id="downloadBtn" onclick="downloadTake()" disabled class="p-3 bg-purple-600 disabled:opacity-40 rounded-2xl flex flex-col items-center justify-center gap-1 active:scale-95 transition">
        <i class="fa-solid fa-download text-white text-lg"></i>
        <span class="text-xs font-bold">Export MP3</span>
      </button>
    </section>

  </main>

  <footer class="p-3 text-center text-[10px] text-slate-500">
    Designed for GitHub Pages PWA &bull; Web Audio API Engine
  </footer>

  <script>
    let audioCtx, micStream, micSource, analyser;
    let mainGain, reverbNode, delayNode, filterNode, compressor;
    let mediaRecorder, recordedChunks = [];
    let isMicActive = false, isRecording = false;
    let currentFilter = 'clean';
    let pitchCorrectionInterval;

    // Standard Musical Chromatic Scale Frequencies (Hz)
    const CHROMATIC_SCALE = [
      130.81, 138.59, 146.83, 155.56, 164.81, 174.61, 185.00, 196.00, 207.65, 220.00, 233.08, 246.94,
      261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88
    ];

    async function initAudioEngine() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      // Node Routing
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048;
      
      mainGain = audioCtx.createGain();
      delayNode = audioCtx.createDelay();
      delayNode.delayTime.value = 0.2;

      filterNode = audioCtx.createBiquadFilter();
      filterNode.type = "highpass";
      filterNode.frequency.value = 80;

      compressor = audioCtx.createDynamicsCompressor();
      
      // Default Synthesized Reverb Impulse
      reverbNode = audioCtx.createConvolver();
      reverbNode.buffer = createImpulseResponse(2.0, 2.0);

      drawVisualizer();
    }

    async function toggleMic() {
      if(!audioCtx) await initAudioEngine();
      if(audioCtx.state === 'suspended') await audioCtx.resume();

      if(!isMicActive) {
        try {
          micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, latency: 0 } });
          micSource = audioCtx.createMediaStreamSource(micStream);
          
          connectAudioGraph();
          
          isMicActive = true;
          document.getElementById('micToggleBtn').classList.replace('bg-slate-800', 'bg-emerald-600');
          document.getElementById('micIcon').className = 'fa-solid fa-microphone text-white text-lg';
          document.getElementById('micLabel').innerText = 'Mic Active';
          document.getElementById('statusBadge').innerText = 'Live Studio Input';
          document.getElementById('statusBadge').className = 'text-xs px-2.5 py-1 rounded-full bg-emerald-500/20 text-emerald-400 border border-emerald-500/30';
          document.getElementById('recBtn').disabled = false;
          
          startPitchTracker();
        } catch(err) {
          alert('Microphone access denied or unavailable: ' + err.message);
        }
      } else {
        stopMic();
      }
    }

    function stopMic() {
      if(micStream) micStream.getTracks().forEach(t => t.stop());
      isMicActive = false;
      clearInterval(pitchCorrectionInterval);
      document.getElementById('micToggleBtn').classList.replace('bg-emerald-600', 'bg-slate-800');
      document.getElementById('micIcon').className = 'fa-solid fa-microphone-slash text-slate-400 text-lg';
      document.getElementById('micLabel').innerText = 'Start Mic';
      document.getElementById('statusBadge').innerText = 'Mic Off';
      document.getElementById('statusBadge').className = 'text-xs px-2.5 py-1 rounded-full bg-slate-800 text-slate-400 border border-slate-700';
      document.getElementById('recBtn').disabled = true;
    }

    function connectAudioGraph() {
      micSource.disconnect();
      filterNode.disconnect();
      compressor.disconnect();

      // Routing: Mic -> EQ/Filter -> Dynamic Compressor -> Delay Node -> Output Destination + Analyser
      micSource.connect(filterNode);
      filterNode.connect(compressor);
      compressor.connect(delayNode);
      delayNode.connect(analyser);
      analyser.connect(audioCtx.destination);
    }

    // Dynamic Procedural Reverb Buffer Generator
    function createImpulseResponse(duration, decay) {
      let sampleRate = 44100;
      let length = sampleRate * duration;
      let impulse = new AudioContext().createBuffer(2, length, sampleRate);
      let left = impulse.getChannelData(0);
      let right = impulse.getChannelData(1);
      for (let i = 0; i < length; i++) {
        let n = length - i;
        left[i] = (Math.random() * 2 - 1) * Math.pow(n / length, decay);
        right[i] = (Math.random() * 2 - 1) * Math.pow(n / length, decay);
      }
      return impulse;
    }

    // Voice Filter Presets
    function setFilter(type) {
      currentFilter = type;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('border-pink-500', 'text-white');
        btn.classList.add('text-slate-400');
      });
      document.getElementById(`btn-${type}`).classList.add('border-pink-500', 'text-white');

      if(!audioCtx) return;

      if (type === 'clean') {
        filterNode.type = 'highpass';
        filterNode.frequency.value = 80;
      } else if (type === 'radio') {
        filterNode.type = 'bandpass';
        filterNode.frequency.value = 2000;
      } else if (type === 'reverb') {
        filterNode.type = 'peaking';
        filterNode.frequency.value = 3000;
        filterNode.gain.value = 6;
      } else if (type === 'robot') {
        filterNode.type = 'notch';
        filterNode.frequency.value = 440;
      } else if (type === 'bypass') {
        filterNode.type = 'allpass';
      }
    }

    // Auto-Tune Pitch Correction Algorithm (Autocorrelation)
    function startPitchTracker() {
      const buffer = new Float32Array(analyser.fftSize);
      pitchCorrectionInterval = setInterval(() => {
        analyser.getFloatTimeDomainData(buffer);
        let pitch = autoCorrelate(buffer, audioCtx.sampleRate);
        
        if (pitch !== -1) {
          document.getElementById('pitchDisplay').innerText = `Detected: ${Math.round(pitch)} Hz`;
          if(currentFilter === 'autotune') {
            let snappedPitch = findNearestNote(pitch);
            // Snap vocal frequency using Biquad pitch-shifter substitution node
            filterNode.type = "peaking";
            filterNode.frequency.setValueAtTime(snappedPitch, audioCtx.currentTime);
          }
        } else {
          document.getElementById('pitchDisplay').innerText = `Detected: -- Hz`;
        }
      }, 50);
    }

    function autoCorrelate(buf, sampleRate) {
      let SIZE = buf.length;
      let rms = 0;
      for (let i = 0; i < SIZE; i++) { rms += buf[i] * buf[i]; }
      rms = Math.sqrt(rms / SIZE);
      if (rms < 0.01) return -1; // Signal too quiet

      let r1 = 0, r2 = SIZE - 1, thres = 0.2;
      for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
      for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }

      buf = buf.slice(r1, r2);
      SIZE = buf.length;

      let c = new Array(SIZE).fill(0);
      for (let i = 0; i < SIZE; i++)
        for (let j = 0; j < SIZE - i; j++)
          c[i] = c[i] + buf[j] * buf[j + i];

      let d = 0; while (c[d] > c[d + 1]) d++;
      let maxval = -1, maxpos = -1;
      for (let i = d; i < SIZE; i++) {
        if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
      }
      let T0 = maxpos;
      return sampleRate / T0;
    }

    function findNearestNote(freq) {
      return CHROMATIC_SCALE.reduce((prev, curr) => 
        Math.abs(curr - freq) < Math.abs(prev - freq) ? curr : prev
      );
    }

    // Karaoke Track Loader
    function loadKaraokeTrack(event) {
      const file = event.target.files[0];
      if (file) {
        document.getElementById('trackName').innerText = file.name;
        const audioEl = document.getElementById('karaokeAudio');
        audioEl.src = URL.createObjectURL(file);
      }
    }

    // Fine-Tuning Controls
    function updateTuneSpeed(val) { document.getElementById('speedVal').innerText = `${val} ms`; }
    function updateReverb(val) { document.getElementById('reverbVal').innerText = `${val}%`; }
    function updateEcho(val) {
      document.getElementById('echoVal').innerText = `${val}s`;
      if(delayNode) delayNode.delayTime.value = parseFloat(val);
    }

    // Audio Recording Session
    function toggleRecording() {
      if(!isRecording) {
        recordedChunks = [];
        let dest = audioCtx.createMediaStreamDestination();
        analyser.connect(dest);
        
        // Connect Karaoke track if playing
        const trackEl = document.getElementById('karaokeAudio');
        if(!trackEl.paused) {
          let trackSource = audioCtx.createMediaElementSource(trackEl);
          trackSource.connect(dest);
          trackSource.connect(audioCtx.destination);
        }

        mediaRecorder = new MediaRecorder(dest.stream);
        mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => { document.getElementById('downloadBtn').disabled = false; };
        
        mediaRecorder.start();
        isRecording = true;
        document.getElementById('recBtn').className = 'p-3 bg-red-600 rounded-2xl flex flex-col items-center justify-center gap-1 active:scale-95 transition';
        document.getElementById('recIcon').className = 'fa-solid fa-square text-white text-lg';
        document.getElementById('recLabel').innerText = 'Stop';
      } else {
        mediaRecorder.stop();
        isRecording = false;
        document.getElementById('recBtn').className = 'p-3 bg-pink-600 rounded-2xl flex flex-col items-center justify-center gap-1 active:scale-95 transition';
        document.getElementById('recIcon').className = 'fa-solid fa-circle text-white text-lg';
        document.getElementById('recLabel').innerText = 'Record';
      }
    }

    function downloadTake() {
      const blob = new Blob(recordedChunks, { type: 'audio/mp3' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `VocalStudio_Take_${Date.now()}.mp3`;
      a.click();
    }

    // Waveform Canvas Visualizer
    function drawVisualizer() {
      const canvas = document.getElementById('visualizer');
      const ctx = canvas.getContext('2d');
      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);

      function render() {
        requestAnimationFrame(render);
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;

        analyser.getByteFrequencyData(dataArray);
        ctx.fillStyle = 'rgba(13, 17, 23, 0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const barWidth = (canvas.width / bufferLength) * 2.5;
        let x = 0;

        for (let i = 0; i < bufferLength; i++) {
          let barHeight = (dataArray[i] / 255) * canvas.height;
          ctx.fillStyle = `hsl(${i * 2 + 300}, 100%, 50%)`;
          ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
          x += barWidth + 1;
        }
      }
      render();
    }
  </script>
</body>
</html>
